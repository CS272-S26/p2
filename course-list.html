<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course List Page</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link href="styles.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="make-header.js" defer></script>
    <script src="course-list.js" defer></script>
    <script src="create-course-list.js" defer></script>
  </head>

  <body>
    <style>
      .course-list-h2 {
        padding-left: 40px;
        padding-right: 40px;
        padding-top: 20px;
      }

      .course-list-body {
        padding-left: 40px;
        padding-right: 40px;
        padding-top: 20px;
      }

      .course-list-box {
        padding-left: 40px;
        padding-right: 40px;
        padding-bottom: 20px;
      }
    </style>
    <div id="header"></div>
    <div>
      <h2 class="course-list-h2">
        Look through some CS and CS-adjacent courses!
      </h2>
      <p class="course-list-body">
        Press the star and the course will be saved on the "My Courses" page!
      </p>
      <div class="course-list-box">
        <input
          type="text"
          id="course-search"
          class="form-control"
          placeholder="Search courses by ID, name, or keywords, e.g., CS200, Programming I, java..."
        />
        <p id="no-course-result" class="pt-3" style="display: none">
          No courses matches your search.
        </p>
      </div>
      <div class="course-list-box">
        <ul id="course-list" class="list-group"></ul>
      </div>
    </div>
  </body>
</html>
