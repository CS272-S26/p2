<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Fields Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="styles.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="make-header.js" defer></script>
    <style>
        .big-oval {
            position: relative;
            width: min(95vw, 1200px);
            aspect-ratio: 2 / 1;
            margin-top: 60px;
            margin-left: auto;
            margin-right: auto;
            outline: 2px solid black;
            border-radius: 50%;
            background-color: white;
        }

        .oval-element {
            position: absolute;
            width: clamp(90px, 16vw, 200px);
            height: clamp(45px, 8vw, 100px);
            background: #C5050C;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translate(-50%, -50%);
            border: 4px solid black;
            cursor: pointer;
            font-size: clamp(10px, 1.3vw, 16px);
            white-space: pre-line;
            text-align: center;
            padding: 6px;
            line-height: 1.1;
        }

        .oval-center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(70%, 500px);
            min-height: 120px;
            background: white;
            border: 2px solid black;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.4;
            font-size: clamp(12px, 1.1vw, 16px);
        }

        .main-title-cs-maps {
            margin-left: 30px;
            margin-top: 20px;
            background-color: white;
        }

        .accordion-button:not(.collapsed) {
            background-color: #C5050C;
            color: white;
        }

        .accordion-button {
            font-weight: 600;
        }

        .accordion-button:focus {
            box-shadow: none;
            border-color: #C5050C;
        }

        @media (max-width: 767.98px) {
            .main-title-cs-maps {
                margin-left: 16px;
                margin-right: 16px;
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>
    <div id="header"></div>

    <h1 class="main-title-cs-maps">Fields of Computer Science</h1>

    <!-- Desktop / tablet oval map -->
    <div class="d-none d-md-block">
        <div class="big-oval" id="big-oval">
            <div class="oval-center-text" id="oval-center-text">
                Loading descriptions...
            </div>
        </div>
    </div>

    <!-- Mobile accordion -->
    <div class="container d-block d-md-none mt-4">
        <div class="accordion" id="csAccordion"></div>
    </div>

    <br>

    <p style="margin-top: 60px; margin-left: 20px; margin-right: 20px;">
        Descriptions from
        <a href="https://en.wikipedia.org/api/rest_v1/" target="_blank">
            https://en.wikipedia.org/api/rest_v1/
        </a>
    </p>

    <script>
        /**
         * Maps each CS field name to its corresponding Wikipedia article title.
         * Descriptions are fetched dynamically from the Wikipedia API at load time.
         */
        const csFields = {
            "Data Science": "data science",
            "Database Systems": "database management system",
            "Security": "computer security",
            "Quantum Computing": "quantum computing",
            "Optimization": "mathematical optimization",
            "Human Computer Interaction": "human–computer interaction",
            "Graphics / Visual Computing": "computer graphics",
            "Theory": "theory of computation",
            "Programming Languages\n&\nSoftware Engineering": "programming language",
            "Networks": "computer network",
            "Systems": "operating system",
            "Computer Architecture": "computer architecture",
            "Machine Learning": "machine learning",
            "Computer Vision": "computer vision",
            "Robotics": "robotics"
        };

        const bigOval = document.getElementById("big-oval");
        const centerText = document.getElementById("oval-center-text");
        const csAccordion = document.getElementById("csAccordion");

        let selectedItem = null;

        /**
         * Fetches a plain text summary from the Wikipedia REST API for a given topic.
         * @param {string} topic - the Wikipedia article title to fetch
         * @returns {Promise<string>} the plain text extract of the article
         */
        function fetchWikipediaSummary(topic) {
            const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic)}`;
            return fetch(url)
                .then(res => res.json())
                .then(data => data.extract)
                .catch(() => 'Description not available.');
        }

        /**
         * Fetches Wikipedia summaries for all CS fields and replaces the topic
         * strings in csFields with the actual descriptions, then renders both
         * the desktop map and mobile accordion.
         */
        async function loadDescriptions() {
            const fields = Object.keys(csFields);
            for (const field of fields) {
                const topic = csFields[field];
                const summary = await fetchWikipediaSummary(topic);
                csFields[field] = summary;
            }
            centerText.textContent = "Click a topic to see a description.";
            renderDesktopMap();
            renderMobileAccordion();
        }

        /**
         * Renders the oval map on desktop/tablet screen sizes.
         * Places each CS field as a clickable oval element around the perimeter
         * of the big oval, and updates the center text on click.
         */
        function renderDesktopMap() {
            if (!bigOval) return;

            const existingNodes = bigOval.querySelectorAll(".oval-element");
            existingNodes.forEach(node => node.remove());

            const ovalWidth = bigOval.offsetWidth;
            const ovalHeight = bigOval.offsetHeight;

            const ovalCenterX = ovalWidth / 2;
            const ovalCenterY = ovalHeight / 2;

            const ovalRadiusX = ovalWidth / 2;
            const ovalRadiusY = ovalHeight / 2;

            const fields = Object.keys(csFields);

            fields.forEach((field, index) => {
                const angle = (2 * Math.PI / fields.length) * index;

                const x = ovalCenterX + ovalRadiusX * Math.cos(angle);
                const y = ovalCenterY + ovalRadiusY * Math.sin(angle);

                const item = document.createElement("div");
                item.classList.add("oval-element");
                item.textContent = field;

                item.style.left = `${x}px`;
                item.style.top = `${y}px`;

                // Update center text with Wikipedia description on click
                item.addEventListener("click", function () {
                    centerText.textContent = csFields[field];

                    if (selectedItem) {
                        selectedItem.style.backgroundColor = "#C5050C";
                    }

                    item.style.backgroundColor = "#8B0000";
                    selectedItem = item;
                });

                // Hover highlight effect
                item.addEventListener("mouseover", function () {
                    if (item !== selectedItem) {
                        item.style.backgroundColor = "#ff2930";
                    }
                });

                item.addEventListener("mouseout", function () {
                    if (item !== selectedItem) {
                        item.style.backgroundColor = "#C5050C";
                    }
                });

                bigOval.appendChild(item);
            });
        }

        /**
         * Renders the mobile accordion with each CS field as an expandable item.
         * Used on smaller screen sizes instead of the oval map.
         */
        function renderMobileAccordion() {
            if (!csAccordion) return;

            while (csAccordion.firstChild) {
                csAccordion.removeChild(csAccordion.firstChild);
            }

            const fields = Object.entries(csFields);

            fields.forEach(([field, description], index) => {
                const accordionItem = document.createElement("div");
                accordionItem.className = "accordion-item";

                const accordionHeader = document.createElement("h2");
                accordionHeader.className = "accordion-header";
                accordionHeader.id = `heading-${index}`;

                const accordionButton = document.createElement("button");
                accordionButton.className = "accordion-button collapsed";
                accordionButton.type = "button";
                accordionButton.setAttribute("data-bs-toggle", "collapse");
                accordionButton.setAttribute("data-bs-target", `#collapse-${index}`);
                accordionButton.setAttribute("aria-expanded", "false");
                accordionButton.setAttribute("aria-controls", `collapse-${index}`);
                accordionButton.textContent = field.replaceAll("\n", " ");

                const collapseDiv = document.createElement("div");
                collapseDiv.id = `collapse-${index}`;
                collapseDiv.className = "accordion-collapse collapse";
                collapseDiv.setAttribute("aria-labelledby", `heading-${index}`);
                collapseDiv.setAttribute("data-bs-parent", "#csAccordion");

                const accordionBody = document.createElement("div");
                accordionBody.className = "accordion-body";
                accordionBody.textContent = description;

                collapseDiv.appendChild(accordionBody);
                accordionHeader.appendChild(accordionButton);
                accordionItem.appendChild(accordionHeader);
                accordionItem.appendChild(collapseDiv);
                csAccordion.appendChild(accordionItem);
            });
        }

        // Load Wikipedia descriptions then render both views
        loadDescriptions();

        window.addEventListener("resize", renderDesktopMap);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
